<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Products | Dairies Café</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f5efe9;
    --espresso: #2d1f1a;
    --milk: #fdfaf7;
    --latte: #c8a27a;
    --caramel: #a67c52;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--espresso);
}

/* Navbar (MATCHED WITH OTHER PAGES) */
.navbar {
    display: flex;
    justify-content: center;
    gap: 40px;
    background-color: var(--milk);
    padding: 18px;
    border-bottom: 1px solid #eee;
}

.navbar a {
    position: relative;
    text-decoration: none;
    color: var(--espresso);
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* underline animation */
.navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background-color: var(--latte);
    transition: 0.3s;
}

.navbar a:hover::after {
    width: 100%;
}

/* Header */
.header {
    text-align: center;
    padding: 60px 20px 20px;
}

.header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
}

/* Tabs */
.tabs {
    text-align: center;
    margin: 20px;
}

.tabs button {
    padding: 10px 18px;
    border: none;
    margin: 5px;
    border-radius: 20px;
    background-color: #ddd;
    cursor: pointer;
    transition: 0.3s;
}

.tabs button.active {
    background-color: var(--latte);
    color: white;
}

/* Menu Grid */
.menu {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
}

/* Card */
.card {
    background: var(--milk);
    border-radius: 18px;
    padding: 15px;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* Badge */
.badge {
    position: absolute;
    top: 10px;
    left: 10px;
    background: var(--latte);
    color: white;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 10px;
}

/* Image */
.card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
    border-radius: 10px;
}

/* Price */
.price {
    margin-top: 5px;
    color: var(--latte);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
}

.modal-content {
    background: var(--milk);
    margin: 10% auto;
    padding: 20px;
    width: 300px;
    border-radius: 15px;
    text-align: center;
}

.modal img {
    width: 100%;
    border-radius: 10px;
}

/* Buttons */
.modal button {
    margin-top: 10px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: var(--latte);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.modal button:hover {
    background: var(--caramel);
}

/* Footer */
.footer {
    text-align: center;
    padding: 18px;
    background: var(--espresso);
    color: var(--milk);
    margin-top: 40px;
}
</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
    <a href="Index.html">Home</a>
    <a href="about.html">About</a>
    <a href="cart.html">Cart</a>
</div>

<!-- Header -->
<div class="header">
    <h1>Our Menu</h1>
</div>

<!-- Tabs -->
<div class="tabs">
    <button class="active" onclick="filterMenu('all', event)">All</button>
    <button onclick="filterMenu('drink', event)">Drinks</button>
    <button onclick="filterMenu('dessert', event)">Desserts</button>
</div>

<!-- Menu -->
<div class="menu" id="menu"></div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <img id="m-img">
        <h2 id="m-name"></h2>
        <p id="m-desc"></p>
        <h3 id="m-price"></h3>
        <button onclick="addToCart()">Add to Cart</button>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<!-- Footer -->
<div class="footer">
    © 2026 Dairies Café | All Rights Reserved
</div>

<script>
const products = [
{ id:"latte", name:"Classic Latte", price:25000, desc:"Smooth espresso with milk", img:"classic latte.jpeg", type:"drink", best:true },
{ id:"cappuccino", name:"Cappuccino", price:28000, desc:"Rich foam espresso", img:"cappuccino.jpeg", type:"drink" },
{ id:"iced", name:"Iced Coffee", price:22000, desc:"Refreshing cold brew", img:"Iced Coffee.jpg", type:"drink" },
{ id:"croissant", name:"Croissant", price:18000, desc:"Flaky buttery pastry", img:"croissant.webp", type:"dessert", best:true },
{ id:"cheesecake", name:"Cheesecake", price:30000, desc:"Soft creamy dessert", img:"cheesecake.avif", type:"dessert" }
];

let currentProduct = null;

function loadMenu(filter="all"){
    let menu = document.getElementById("menu");
    menu.innerHTML = "";

    products.forEach(p=>{
        if(filter==="all" || p.type===filter){
            menu.innerHTML += `
            <div class="card" onclick="openModal('${p.id}')">
                ${p.best ? '<div class="badge">Best Seller</div>' : ''}
                <img src="${p.img}">
                <h3>${p.name}</h3>
                <div class="price">Rp ${p.price}</div>
            </div>`;
        }
    });
}

function filterMenu(type, e){
    document.querySelectorAll('.tabs button').forEach(btn => btn.classList.remove('active'));
    e.target.classList.add('active');
    loadMenu(type);
}

function openModal(id){
    currentProduct = products.find(p=>p.id===id);

    document.getElementById("m-img").src = currentProduct.img;
    document.getElementById("m-name").innerText = currentProduct.name;
    document.getElementById("m-desc").innerText = currentProduct.desc;
    document.getElementById("m-price").innerText = "Rp " + currentProduct.price;

    document.getElementById("modal").style.display = "block";
}

function closeModal(){
    document.getElementById("modal").style.display = "none";
}

function addToCart(){
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart.push(currentProduct);
    localStorage.setItem("cart", JSON.stringify(cart));
    alert("Added to cart 😎");
}

loadMenu();
</script>

</body>
</html>

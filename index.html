<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dairies Café Website</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #f5efe9;
    --espresso: #2d1f1a;
    --milk: #fdfaf7;
    --latte: #c8a27a;
    --caramel: #a67c52;
}

body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background-color: var(--bg);
    color: var(--espresso);

    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

main {
    flex: 1;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 40px;
    background-color: var(--milk);
    padding: 18px;
    border-bottom: 1px solid #eee;

    position: sticky;
    top: 0;
    z-index: 1000;
}

/* Brand inside navbar - Now a Link */
.brand {
    font-weight: 700;
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    margin-right: 20px;
    color: var(--espresso);
    text-decoration: none; /* Removes underline from the brand link */
}

/* Navbar links */
.navbar a {
    position: relative;
    text-decoration: none;
    color: var(--espresso);
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: 0.3s;
}

/* Hover animation */
.navbar a::after {
    content: "";
    position: absolute;
    left: 0;
    bottom: -5px;
    width: 0%;
    height: 2px;
    background-color: var(--latte);
    transition: 0.3s;
}

.navbar a:hover {
    color: var(--caramel);
    transform: translateY(-2px);
}

.navbar a:hover::after {
    width: 100%;
}

/* Hero */
.hero {
    text-align: center;
    padding: 60px 20px;
}

.logo {
    width: 110px;
    margin-bottom: 15px;
}

.hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    margin: 10px 0;
    letter-spacing: 1px;
}

.hero p {
    font-size: 16px;
    opacity: 0.75;
}

/* Image */
.main-image {
    width: 360px;
    margin: 40px auto;
    display: block;
    border-radius: 18px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

/* Buttons */
.buttons {
    text-align: center;
    margin: 20px;
}

.buttons button {
    padding: 12px 28px;
    margin: 10px;
    border: none;
    border-radius: 30px;
    background-color: var(--latte);
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.buttons button:hover {
    background-color: var(--caramel);
    transform: translateY(-2px);
}

/* Footer */
.footer {
    text-align: center;
    padding: 18px;
    background-color: var(--espresso);
    color: var(--milk);
    font-size: 13px;
    letter-spacing: 0.5px;
}
</style>
</head>

<body>

<main>

<!-- Navbar -->
<div class="navbar">
    <!-- FIX: Added index.html link to the brand name -->
    <a href="index.html" class="brand">☕ Dairies Café</a>
    
    <a href="about.html">About</a>
    <a href="product.html">Products</a>
    <a href="cart.html">Cart</a>
</div>

<!-- Hero -->
<div class="hero">
    <img src="logo.png" alt="Logo" class="logo">
    <h1>Dairies Café</h1>
    <p>A Cup of Comfort</p>
</div>

<!-- Image -->
<img src="Main image.png" alt="Main Image" class="main-image">

</main>

<!-- Footer -->
<div class="footer">
    © 2026 Dairies Café | All Rights Reserved
</div>

</body>
</html>
